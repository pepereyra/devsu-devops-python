name: CI-CD

on:
  push:
    branches:
      - develop
      - main
  pull_request:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/devsu-devops-python
  DJANGO_SECRET_KEY: test-secret-key
  DJANGO_DEBUG: "False"
  DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0
  DATABASE_NAME: db.sqlite3

jobs:
  test-build-scan:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.3"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Collect static files
        run: |
          python manage.py collectstatic --noinput

      - name: Run unit tests
        run: |
          python manage.py test

      - name: Build Docker image
        run: |
          docker build -t $IMAGE_NAME:${{ github.sha }} -t $IMAGE_NAME:latest .

      - name: Run container
        run: |
          docker run -d --name app \
            -p 8000:8000 \
            -e DJANGO_SECRET_KEY=test-secret-key \
            -e DJANGO_DEBUG=False \
            -e DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1 \
            -e DATABASE_NAME=db.sqlite3 \
            $IMAGE_NAME:${{ github.sha }} \
            sh -c "python manage.py migrate && gunicorn demo.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 60"

      - name: Wait for application
        run: |
          for i in {1..30}; do
            curl -f http://localhost:8000/api/health/live/ && exit 0
            sleep 2
          done
          docker logs app
          exit 1

      - name: Validate health endpoints
        run: |
          curl --fail http://localhost:8000/api/health/live/
          curl --fail http://localhost:8000/api/health/ready/
          curl --fail http://localhost:8000/api/users/

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ github.sha }}'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image
        if: github.event_name != 'pull_request'
        run: |
          docker push $IMAGE_NAME:${{ github.sha }}
          docker push $IMAGE_NAME:latest